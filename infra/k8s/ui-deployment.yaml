apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-ui
  namespace: loan-app
  labels:
    app: loan-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loan-ui
  template:
    metadata:
      labels:
        app: loan-ui
    spec:
      containers:
        - name: loan-ui
          image: __UI_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          env:
            - name: API_URL
              value: http://loan-api.loan-app.svc.cluster.local:8000/predict
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
